<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient1)" opacity="0.1"/>
  
  <!-- Central hub -->
  <circle cx="100" cy="100" r="25" fill="url(#gradient1)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="20" fill="white" opacity="0.9"/>
  <circle cx="100" cy="100" r="15" fill="url(#gradient1)"/>
  
  <!-- Central AI symbol -->
  <text x="100" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">AI</text>
  
  <!-- Provider nodes -->
  <!-- OpenAI -->
  <circle cx="100" cy="40" r="18" fill="url(#gradient2)" filter="url(#glow)"/>
  <circle cx="100" cy="40" r="14" fill="white" opacity="0.9"/>
  <text x="100" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3b82f6">O</text>
  
  <!-- Anthropic -->
  <circle cx="160" cy="100" r="18" fill="url(#gradient3)" filter="url(#glow)"/>
  <circle cx="160" cy="100" r="14" fill="white" opacity="0.9"/>
  <text x="160" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#059669">A</text>
  
  <!-- Google -->
  <circle cx="100" cy="160" r="18" fill="url(#gradient4)" filter="url(#glow)"/>
  <circle cx="100" cy="160" r="14" fill="white" opacity="0.9"/>
  <text x="100" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d97706">G</text>
  
  <!-- xAI -->
  <circle cx="40" cy="100" r="18" fill="url(#gradient1)" filter="url(#glow)"/>
  <circle cx="40" cy="100" r="14" fill="white" opacity="0.9"/>
  <text x="40" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#8b5cf6">X</text>
  
  <!-- Connection lines with animation effect -->
  <line x1="100" y1="58" x2="100" y2="75" stroke="url(#gradient2)" stroke-width="3" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="142" y1="100" x2="125" y2="100" stroke="url(#gradient3)" stroke-width="3" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="125" x2="100" y2="142" stroke="url(#gradient4)" stroke-width="3" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="58" y1="100" x2="75" y2="100" stroke="url(#gradient1)" stroke-width="3" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- Data flow indicators -->
  <circle cx="100" cy="50" r="3" fill="url(#gradient2)">
    <animate attributeName="cy" values="50;70;50" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="100" r="3" fill="url(#gradient3)">
    <animate attributeName="cx" values="150;130;150" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="150" r="3" fill="url(#gradient4)">
    <animate attributeName="cy" values="150;130;150" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="100" r="3" fill="url(#gradient1)">
    <animate attributeName="cx" values="50;70;50" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
