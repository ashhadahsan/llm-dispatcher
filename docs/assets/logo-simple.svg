<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Central hub -->
  <circle cx="30" cy="30" r="20" fill="url(#gradient1)"/>
  <circle cx="30" cy="30" r="15" fill="white" opacity="0.9"/>
  <circle cx="30" cy="30" r="10" fill="url(#gradient1)"/>
  
  <!-- AI symbol -->
  <text x="30" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">AI</text>
  
  <!-- Provider nodes -->
  <circle cx="30" cy="10" r="6" fill="url(#gradient2)"/>
  <circle cx="50" cy="30" r="6" fill="url(#gradient3)"/>
  <circle cx="30" cy="50" r="6" fill="url(#gradient4)"/>
  <circle cx="10" cy="30" r="6" fill="url(#gradient1)"/>
  
  <!-- Connection lines -->
  <line x1="30" y1="16" x2="30" y2="20" stroke="url(#gradient2)" stroke-width="2"/>
  <line x1="44" y1="30" x2="40" y2="30" stroke="url(#gradient3)" stroke-width="2"/>
  <line x1="30" y1="40" x2="30" y2="44" stroke="url(#gradient4)" stroke-width="2"/>
  <line x1="16" y1="30" x2="20" y2="30" stroke="url(#gradient1)" stroke-width="2"/>
  
  <!-- Text -->
  <text x="70" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">LLM</text>
  <text x="70" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6366f1">Dispatcher</text>
  
  <!-- Subtitle -->
  <text x="70" y="55" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">Intelligent LLM Routing</text>
</svg>
