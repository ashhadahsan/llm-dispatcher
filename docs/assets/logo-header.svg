<svg width="180" height="40" viewBox="0 0 180 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Central hub -->
  <circle cx="20" cy="20" r="12" fill="url(#gradient1)"/>
  <circle cx="20" cy="20" r="8" fill="white" opacity="0.9"/>
  <circle cx="20" cy="20" r="5" fill="url(#gradient1)"/>
  
  <!-- AI symbol -->
  <text x="20" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">AI</text>
  
  <!-- Provider nodes -->
  <circle cx="20" cy="6" r="3" fill="url(#gradient2)"/>
  <circle cx="34" cy="20" r="3" fill="url(#gradient3)"/>
  <circle cx="20" cy="34" r="3" fill="url(#gradient4)"/>
  <circle cx="6" cy="20" r="3" fill="url(#gradient1)"/>
  
  <!-- Connection lines -->
  <line x1="20" y1="9" x2="20" y2="12" stroke="url(#gradient2)" stroke-width="1.5"/>
  <line x1="31" y1="20" x2="28" y2="20" stroke="url(#gradient3)" stroke-width="1.5"/>
  <line x1="20" y1="28" x2="20" y2="31" stroke="url(#gradient4)" stroke-width="1.5"/>
  <line x1="9" y1="20" x2="12" y2="20" stroke="url(#gradient1)" stroke-width="1.5"/>
  
  <!-- Text -->
  <text x="50" y="18" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">LLM</text>
  <text x="50" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#6366f1">Dispatcher</text>
  
  <!-- Subtitle -->
  <text x="50" y="38" font-family="Arial, sans-serif" font-size="6" fill="#6b7280">Intelligent Routing</text>
</svg>
